name: 🤖 CI Agent

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          pip install ruff mypy
          [ -f requirements.txt ] && pip install -r requirements.txt || true

      - name: Run ESLint
        run: npx eslint . --ext .ts,.tsx,.js,.jsx --max-warnings 0
        continue-on-error: true
        id: eslint

      - name: Run TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true
        id: typecheck

      - name: Run Ruff (Python linter)
        run: ruff check . --output-format github
        continue-on-error: true
        id: ruff

      - name: Build project
        run: npm run build
        continue-on-error: true
        id: build

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              eslint: "${{ steps.eslint.outcome }}",
              typecheck: "${{ steps.typecheck.outcome }}",
              ruff: "${{ steps.ruff.outcome }}",
              build: "${{ steps.build.outcome }}"
            };
            const icon = (r) => r === "success" ? "✅" : "❌";
            const body = `## 🤖 CI Agent Report
            | Check | Status |
            |-------|--------|
            | ESLint | ${icon(results.eslint)} ${results.eslint} |
            | TypeScript | ${icon(results.typecheck)} ${results.typecheck} |
            | Python Ruff | ${icon(results.ruff)} ${results.ruff} |
            | Build | ${icon(results.build)} ${results.build} |`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
