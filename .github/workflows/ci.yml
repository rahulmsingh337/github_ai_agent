name: 🤖 CI Agent

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci

      - name: Install Python dependencies
        run: |
          pip install ruff mypy --quiet
          [ -f requirements.txt ] && pip install -r requirements.txt --quiet || true

      - name: Run ESLint
        id: eslint
        if: hashFiles('package.json') != '' && hashFiles('.eslintrc*', 'eslint.config*') != ''
        run: npx eslint . --ext .ts,.tsx,.js,.jsx --max-warnings 0
        continue-on-error: true

      - name: Run TypeScript check
        id: typecheck
        if: hashFiles('tsconfig.json') != ''
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run Ruff (Python linter)
        id: ruff
        run: |
          PY_FILES=$(find . -name "*.py" ! -path "*/node_modules/*" ! -path "*/.git/*" | head -1)
          if [ -n "$PY_FILES" ]; then
            ruff check . --output-format github
          else
            echo "No Python files found — skipping Ruff"
          fi
        continue-on-error: true

      - name: Build project
        id: build
        if: hashFiles('package.json') != ''
        run: npm run build
        continue-on-error: true

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const outcomes = {
              eslint:    "${{ steps.eslint.outcome }}",
              typecheck: "${{ steps.typecheck.outcome }}",
              ruff:      "${{ steps.ruff.outcome }}",
              build:     "${{ steps.build.outcome }}"
            };
            const icon = (r) => r === "success" ? "✅" : r === "skipped" ? "⏭️" : "❌";
            const row = (name, key) => `| ${name} | ${icon(outcomes[key])} ${outcomes[key] || "skipped"} |`;

            const body = [
              "## 🤖 CI Agent Report",
              "",
              "| Check | Status |",
              "|-------|--------|",
              row("ESLint", "eslint"),
              row("TypeScript", "typecheck"),
              row("Python Ruff", "ruff"),
              row("Build", "build"),
              "",
              `> Commit: \`${{ github.sha }}\``
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existing = comments.find(c =>
              c.user.login === "github-actions[bot]" && c.body.includes("🤖 CI Agent Report")
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner, repo: context.repo.repo, body
              });
            }
