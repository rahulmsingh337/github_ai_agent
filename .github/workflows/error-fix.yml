name: 🔧 Error-Fix Agent

on:
  push:
    branches: ["**"]

permissions:
  contents: write
  checks: write

jobs:
  error-fix:
    runs-on: ubuntu-latest
    concurrency:
      group: error-fix-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci

      - name: Install Python tools
        run: pip install ruff mypy --quiet 2>/dev/null || true

      - name: TypeScript check
        id: ts_check
        if: hashFiles('tsconfig.json') != ''
        run: |
          if npx tsc --noEmit 2>&1 | tee /tmp/ts-errors.txt; then
            echo "errors=0" >> $GITHUB_OUTPUT
            echo "success=true" >> $GITHUB_OUTPUT
          else
            ERROR_COUNT=$(grep -c "error TS" /tmp/ts-errors.txt || echo "0")
            echo "errors=$ERROR_COUNT" >> $GITHUB_OUTPUT
            echo "success=false" >> $GITHUB_OUTPUT
            echo "::error::TypeScript: $ERROR_COUNT compilation error(s) found"
          fi
        continue-on-error: true

      - name: Build check
        id: build_check
        if: hashFiles('package.json') != ''
        run: |
          if npm run build 2>&1 | tee /tmp/build-output.txt; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "::error::Build failed — check artifacts for details"
          fi
        continue-on-error: true

      - name: Python syntax check
        id: py_check
        run: |
          PY_FILES=$(find . -name "*.py" ! -path "*/node_modules/*" ! -path "*/.git/*" ! -path "*/dist/*")
          if [ -z "$PY_FILES" ]; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "no_python=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if echo "$PY_FILES" | xargs python3 -m py_compile 2>&1 | tee /tmp/py-errors.txt; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "::error::Python syntax errors found"
          fi
        continue-on-error: true

      - name: Secret scan (changed files only)
        id: secret_scan
        run: |
          FOUND=false
          CHANGED=$(git diff HEAD~1 --name-only 2>/dev/null || git show --name-only HEAD | tail -n +2)
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue
            if grep -qE "AKIA[0-9A-Z]{16}" "$file" 2>/dev/null; then
              echo "::error file=$file::Potential AWS Access Key detected"
              FOUND=true
            fi
            if grep -qE "ghp_[A-Za-z0-9]{36}" "$file" 2>/dev/null; then
              echo "::error file=$file::Potential GitHub Token detected"
              FOUND=true
            fi
            if grep -qE "sk-[A-Za-z0-9]{32,}" "$file" 2>/dev/null; then
              echo "::error file=$file::Potential AI API key detected"
              FOUND=true
            fi
          done <<< "$CHANGED"
          echo "found=$FOUND" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Auto-fix Python with Ruff
        if: steps.py_check.outputs.success == 'false' && steps.py_check.outputs.no_python != 'true'
        run: |
          ruff check . --fix || true
          ruff format . || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No auto-fixable Python issues"
          else
            git commit -m "fix: auto-apply Ruff formatting fixes"
            git push || true
          fi

      - name: Upload error artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-reports-${{ github.sha }}
          path: |
            /tmp/ts-errors.txt
            /tmp/build-output.txt
            /tmp/py-errors.txt
          retention-days: 7
          if-no-files-found: ignore

      - name: Job Summary
        if: always()
        run: |
          echo "## 🔧 Error-Fix Agent Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          TS="${{ steps.ts_check.outcome }}"
          BUILD="${{ steps.build_check.outcome }}"
          PY="${{ steps.py_check.outcome }}"
          SECRETS="${{ steps.secret_scan.outputs.found }}"
          [ "$TS" = "success" ] && echo "| TypeScript | ✅ Pass |" >> $GITHUB_STEP_SUMMARY || echo "| TypeScript | ${TS:-⏭️ skipped} |" >> $GITHUB_STEP_SUMMARY
          [ "$BUILD" = "success" ] && echo "| Build | ✅ Pass |" >> $GITHUB_STEP_SUMMARY || echo "| Build | ${BUILD:-⏭️ skipped} |" >> $GITHUB_STEP_SUMMARY
          [ "$PY" = "success" ] && echo "| Python | ✅ Pass |" >> $GITHUB_STEP_SUMMARY || echo "| Python | ${PY:-⏭️ skipped} |" >> $GITHUB_STEP_SUMMARY
          [ "$SECRETS" = "false" ] && echo "| Secrets | ✅ Clean |" >> $GITHUB_STEP_SUMMARY || echo "| Secrets | 🚨 Review Required |" >> $GITHUB_STEP_SUMMARY
