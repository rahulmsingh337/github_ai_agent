name: 🔧 Error-Fix Agent

on:
  push:
    branches: ["**"]

permissions:
  contents: write
  checks: write

jobs:
  error-fix:
    runs-on: ubuntu-latest
    concurrency:
      group: error-fix-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      # ── Language Detection ─────────────────────────────────
      - name: Detect languages
        id: detect
        run: |
          has_node=false; has_python=false; has_go=false; has_rust=false; has_java=false
          [ -f package.json ]     && has_node=true
          find . -name "*.py" ! -path "*/.git/*" ! -path "*/node_modules/*" | grep -q . && has_python=true
          [ -f go.mod ]           && has_go=true
          [ -f Cargo.toml ]       && has_rust=true
          [ -f pom.xml ] || [ -f build.gradle ] && has_java=true

          echo "has_node=$has_node"     >> $GITHUB_OUTPUT
          echo "has_python=$has_python" >> $GITHUB_OUTPUT
          echo "has_go=$has_go"         >> $GITHUB_OUTPUT
          echo "has_rust=$has_rust"     >> $GITHUB_OUTPUT
          echo "has_java=$has_java"     >> $GITHUB_OUTPUT
          echo "Detected → node:$has_node python:$has_python go:$has_go rust:$has_rust java:$has_java"

      # ── Node.js checks ─────────────────────────────────────
      - name: Setup Node.js
        if: steps.detect.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps
        if: steps.detect.outputs.has_node == 'true'
        run: |
          if [ -f package-lock.json ]; then npm ci --prefer-offline
          elif [ -f yarn.lock ];       then npm install -g yarn && yarn install --frozen-lockfile
          else npm install; fi
        continue-on-error: true

      - name: TypeScript check
        id: ts_check
        if: steps.detect.outputs.has_node == 'true' && hashFiles('tsconfig.json') != ''
        run: |
          if npx tsc --noEmit 2>&1 | tee /tmp/ts-errors.txt; then
            echo "success=true"  >> $GITHUB_OUTPUT
            echo "errors=0"      >> $GITHUB_OUTPUT
          else
            COUNT=$(grep -c "error TS" /tmp/ts-errors.txt 2>/dev/null || echo 0)
            echo "success=false" >> $GITHUB_OUTPUT
            echo "errors=$COUNT" >> $GITHUB_OUTPUT
            echo "::error::TypeScript: $COUNT error(s). Run 'npx tsc --noEmit' locally to see details."
            head -20 /tmp/ts-errors.txt | while IFS= read -r line; do
              FILE=$(echo "$line" | grep -oP '^[^(]+' | head -1)
              LINE_NO=$(echo "$line" | grep -oP '\((\d+)' | head -1 | tr -d '(')
              MSG=$(echo "$line" | grep -oP 'error TS.*')
              [ -n "$MSG" ] && echo "::error file=${FILE},line=${LINE_NO}::$MSG"
            done
          fi
        continue-on-error: true

      - name: Node build check
        id: node_build
        if: steps.detect.outputs.has_node == 'true'
        run: |
          if grep -q '"build"' package.json 2>/dev/null; then
            if npm run build 2>&1 | tee /tmp/build-errors.txt; then
              echo "success=true"  >> $GITHUB_OUTPUT
            else
              echo "success=false" >> $GITHUB_OUTPUT
              echo "::error::Build failed. Check artifact 'error-reports' for details."
            fi
          else
            echo "success=true" >> $GITHUB_OUTPUT
            echo "No build script — skipping"
          fi
        continue-on-error: true

      # ── Python checks ──────────────────────────────────────
      - name: Setup Python
        if: steps.detect.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        if: steps.detect.outputs.has_python == 'true'
        run: |
          pip install ruff mypy --quiet
          [ -f requirements.txt ] && pip install -r requirements.txt --quiet 2>/dev/null || true
        continue-on-error: true

      - name: Python syntax check
        id: py_syntax
        if: steps.detect.outputs.has_python == 'true'
        run: |
          PY_FILES=$(find . -name "*.py" ! -path "*/node_modules/*" ! -path "*/.git/*" \
            ! -path "*/__pycache__/*" ! -path "*/dist/*" | sort)
          if [ -z "$PY_FILES" ]; then
            echo "success=true" >> $GITHUB_OUTPUT; exit 0
          fi
          ERRORS=0
          while IFS= read -r f; do
            if ! python3 -m py_compile "$f" 2>/tmp/py-compile-err.txt; then
              ERRORS=$((ERRORS+1))
              ERR=$(cat /tmp/py-compile-err.txt)
              echo "::error file=$f::$ERR"
            fi
          done <<< "$PY_FILES"
          if [ "$ERRORS" -eq 0 ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Ruff check
        id: ruff_check
        if: steps.detect.outputs.has_python == 'true'
        run: |
          if ruff check . --output-format github 2>&1 | tee /tmp/ruff-errors.txt; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            COUNT=$(grep -c "^" /tmp/ruff-errors.txt 2>/dev/null || echo "?")
            echo "::warning::Ruff found issues. Run 'ruff check . --fix' to auto-fix."
          fi
        continue-on-error: true

      # ── Go checks ──────────────────────────────────────────
      - name: Setup Go
        if: steps.detect.outputs.has_go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Go build check
        id: go_build
        if: steps.detect.outputs.has_go == 'true'
        run: |
          if go build ./... 2>&1 | tee /tmp/go-errors.txt; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "::error::Go build failed"
            cat /tmp/go-errors.txt | while IFS= read -r line; do
              echo "::error::$line"
            done
          fi
        continue-on-error: true

      - name: Go vet
        id: go_vet
        if: steps.detect.outputs.has_go == 'true'
        run: go vet ./... 2>&1 | tee /tmp/go-vet.txt || echo "success=false" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── Rust checks ────────────────────────────────────────
      - name: Setup Rust
        if: steps.detect.outputs.has_rust == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust check
        id: rust_check
        if: steps.detect.outputs.has_rust == 'true'
        run: |
          if cargo check --all 2>&1 | tee /tmp/rust-errors.txt; then
            echo "success=true"  >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "::error::Rust cargo check failed"
          fi
        continue-on-error: true

      # ── Java checks ────────────────────────────────────────
      - name: Setup Java
        if: steps.detect.outputs.has_java == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Java compile check
        id: java_check
        if: steps.detect.outputs.has_java == 'true'
        run: |
          if [ -f pom.xml ]; then
            mvn -B compile -q 2>&1 | tee /tmp/java-errors.txt && \
              echo "success=true" >> $GITHUB_OUTPUT || \
              echo "success=false" >> $GITHUB_OUTPUT
          elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            ./gradlew compileJava 2>&1 | tee /tmp/java-errors.txt && \
              echo "success=true" >> $GITHUB_OUTPUT || \
              echo "success=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      # ── Secret scan ────────────────────────────────────────
      - name: Secret scan (changed files only)
        id: secret_scan
        run: |
          FOUND=false
          CHANGED=$(git diff HEAD~1 --name-only 2>/dev/null || \
                    git show --name-only HEAD | tail -n +2)
          while IFS= read -r file; do
            [ -z "$file" ] || [ ! -f "$file" ] && continue
            scan() {
              local label=$1 pattern=$2
              if grep -qE "$pattern" "$file" 2>/dev/null; then
                echo "::error file=$file::🚨 Potential $label detected in $file"
                FOUND=true
              fi
            }
            scan "AWS Access Key"    "AKIA[0-9A-Z]{16}"
            scan "GitHub Token"      "ghp_[A-Za-z0-9]{36}"
            scan "OpenAI Key"        "sk-[A-Za-z0-9]{48}"
            scan "Anthropic Key"     "sk-ant-[A-Za-z0-9-]+"
            scan "Stripe Live Key"   "sk_live_[A-Za-z0-9]+"
            scan "GCP API Key"       "AIza[0-9A-Za-z-_]{35}"
            scan "Private Key"       "BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY"
          done <<< "$CHANGED"
          echo "found=$FOUND" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── Auto-fix Python if it failed ───────────────────────
      - name: Auto-fix Python (Ruff)
        if: steps.py_syntax.outputs.success == 'false' || steps.ruff_check.outputs.success == 'false'
        run: |
          ruff check . --fix --unsafe-fixes || true
          ruff format . || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No auto-fixable issues found"
          else
            git commit -m "fix: auto-apply Ruff formatting fixes [skip ci]"
            git push || true
            echo "✅ Ruff fixes committed"
          fi

      # ── Upload artifacts ───────────────────────────────────
      - name: Upload error reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-reports-${{ github.sha }}
          path: |
            /tmp/ts-errors.txt
            /tmp/build-errors.txt
            /tmp/ruff-errors.txt
            /tmp/go-errors.txt
            /tmp/go-vet.txt
            /tmp/rust-errors.txt
            /tmp/java-errors.txt
          retention-days: 7
          if-no-files-found: ignore

      # ── Summary ────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## 🔧 Error-Fix Agent Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          result() {
            local outcome=$1 label=$2
            case "$outcome" in
              "true"|"success") echo "| $label | ✅ Pass |" ;;
              "false"|"failure") echo "| $label | ❌ Fail |" ;;
              *) echo "| $label | ⏭️ Skipped |" ;;
            esac
          }

          result "${{ steps.ts_check.outputs.success }}"    "TypeScript"    >> $GITHUB_STEP_SUMMARY
          result "${{ steps.node_build.outputs.success }}"  "Node Build"    >> $GITHUB_STEP_SUMMARY
          result "${{ steps.py_syntax.outputs.success }}"   "Python Syntax" >> $GITHUB_STEP_SUMMARY
          result "${{ steps.ruff_check.outputs.success }}"  "Ruff Lint"     >> $GITHUB_STEP_SUMMARY
          result "${{ steps.go_build.outputs.success }}"    "Go Build"      >> $GITHUB_STEP_SUMMARY
          result "${{ steps.go_vet.outputs.success }}"      "Go Vet"        >> $GITHUB_STEP_SUMMARY
          result "${{ steps.rust_check.outputs.success }}"  "Rust Check"    >> $GITHUB_STEP_SUMMARY
          result "${{ steps.java_check.outputs.success }}"  "Java Compile"  >> $GITHUB_STEP_SUMMARY

          SECRETS="${{ steps.secret_scan.outputs.found }}"
          [ "$SECRETS" = "false" ] && echo "| Secret Scan | ✅ Clean |" >> $GITHUB_STEP_SUMMARY \
                                   || echo "| Secret Scan | 🚨 Review Required |" >> $GITHUB_STEP_SUMMARY
