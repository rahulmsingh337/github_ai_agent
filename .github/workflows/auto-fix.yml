name: 🔧 Auto-Fix Agent

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to fix (leave empty for current branch)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install formatters
        run: |
          [ -f package-lock.json ] && npm ci || true
          pip install ruff --quiet

      - name: Run Ruff auto-fix
        run: |
          PY_FILES=$(find . -name "*.py" ! -path "*/node_modules/*" ! -path "*/.git/*" | head -1)
          if [ -n "$PY_FILES" ]; then
            ruff check . --fix --unsafe-fixes || true
            ruff format . || true
            echo "Ruff fixes applied"
          else
            echo "No Python files — skipping Ruff"
          fi

      - name: Run Prettier
        if: hashFiles('package.json') != ''
        run: |
          npx prettier --write "**/*.{js,jsx,ts,tsx,json,css,md}" \
            --ignore-path .gitignore 2>/dev/null || true

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "✅ No formatting changes needed"
          else
            git commit -m "style: auto-fix formatting (Ruff + Prettier)"
            git push
            echo "✅ Fixes committed and pushed"
          fi
