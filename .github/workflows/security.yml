name: 🔒 Security Agent

on:
  schedule:
    - cron: "0 2 * * 1"  # Every Monday at 2:00 AM UTC
  push:
    paths:
      - "package.json"
      - "package-lock.json"
      - "requirements.txt"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit --quiet

      - name: Run npm audit
        id: npm_audit
        if: hashFiles('package-lock.json') != ''
        run: |
          npm ci --quiet
          npm audit --json > /tmp/npm-audit.json 2>&1 || true
          VULNS=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('/tmp/npm-audit.json'))
              v = d.get('metadata', {}).get('vulnerabilities', {})
              print(v.get('total', 0))
          except:
              print(0)
          ")
          echo "vulnerabilities=$VULNS" >> $GITHUB_OUTPUT
          echo "npm vulnerabilities: $VULNS"
        continue-on-error: true

      - name: Run pip-audit
        id: pip_audit
        run: |
          if [ -f requirements.txt ] && [ -s requirements.txt ]; then
            pip install -r requirements.txt --quiet 2>/dev/null || true
            pip-audit --output=json > /tmp/pip-audit.json 2>&1 || true
            VULNS=$(python3 -c "
          import json
          try:
              d = json.load(open('/tmp/pip-audit.json'))
              total = sum(len(dep.get('vulns', [])) for dep in d.get('dependencies', []))
              print(total)
          except:
              print(0)
            ")
          else
            VULNS=0
            echo "No requirements.txt with content — skipping pip-audit"
          fi
          echo "vulnerabilities=$VULNS" >> $GITHUB_OUTPUT
          echo "pip vulnerabilities: $VULNS"
        continue-on-error: true

      - name: Create GitHub Issue if vulnerabilities found
        uses: actions/github-script@v7
        with:
          script: |
            const npmVulns = parseInt("${{ steps.npm_audit.outputs.vulnerabilities }}") || 0;
            const pipVulns = parseInt("${{ steps.pip_audit.outputs.vulnerabilities }}") || 0;
            const total = npmVulns + pipVulns;

            if (total === 0) {
              console.log("✅ No vulnerabilities found — no issue created");
              return;
            }

            const date = new Date().toISOString().split("T")[0];
            const title = `🔒 Security Alert: ${total} vulnerability/vulnerabilities detected — ${date}`;
            const body = [
              "## 🔒 Security Scan Results",
              "",
              "| Scanner | Vulnerabilities |",
              "|---------|----------------|",
              `| npm audit | ${npmVulns} |`,
              `| pip-audit | ${pipVulns} |`,
              `| **Total** | **${total}** |`,
              "",
              "### Remediation",
              "- Run `npm audit fix` to fix npm vulnerabilities",
              "- Run `pip-audit --fix` to fix Python vulnerabilities",
              "- Review manually for breaking changes before auto-fixing",
              "",
              `> Auto-generated by Security Agent on ${date}`
            ].join("\n");

            // Check for existing open security issue today to avoid duplicates
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "security"
            });
            const todayIssue = issues.find(i => i.title.includes(date));
            if (todayIssue) {
              console.log("Security issue already exists for today — skipping");
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, body, labels: ["security", "automated"]
            });
