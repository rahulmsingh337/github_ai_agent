name: 🔒 Security Agent

on:
  schedule:
    - cron: "0 2 * * 1"  # Every Monday at 2:00 AM UTC
  push:
    paths:
      - "package.json"
      - "package-lock.json"
      - "requirements.txt"
      - "pyproject.toml"

permissions:
  contents: read
  issues: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run npm audit
        id: npm_audit
        run: |
          npm ci
          npm audit --json > npm-audit.json 2>&1 || true
          VULNS=$(cat npm-audit.json | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('total',0))" 2>/dev/null || echo "0")
          echo "vulnerabilities=$VULNS" >> $GITHUB_OUTPUT

      - name: Run pip-audit
        id: pip_audit
        run: |
          pip-audit --output=json > pip-audit.json 2>&1 || true
          VULNS=$(cat pip-audit.json | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(len([v for dep in d.get('dependencies',[]) for v in dep.get('vulns',[])]))" 2>/dev/null || echo "0")
          echo "vulnerabilities=$VULNS" >> $GITHUB_OUTPUT

      - name: Create GitHub Issue if vulnerabilities found
        if: steps.npm_audit.outputs.vulnerabilities > 0 || steps.pip_audit.outputs.vulnerabilities > 0
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split("T")[0];
            const title = `🔒 Security Alert: Vulnerabilities detected - ${date}`;
            const body = `## 🔒 Security Scan Results

            | Scanner | Vulnerabilities |
            |---------|----------------|
            | npm audit | ${{ steps.npm_audit.outputs.vulnerabilities }} |
            | pip-audit | ${{ steps.pip_audit.outputs.vulnerabilities }} |

            ### Remediation
            - Run \`npm audit fix\` to fix npm vulnerabilities
            - Run \`pip-audit --fix\` to fix Python vulnerabilities

            > Auto-generated by Security Agent on ${date}`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["security", "automated"]
            });
