name: 🔍 PR Validator Agent

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR Title (Conventional Commits)
        id: title_check
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if echo "$TITLE" | grep -qE "^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\(.+\))?: .{1,100}$"; then
            echo "valid=true" >> $GITHUB_OUTPUT
            echo "message=Valid Conventional Commit format ✅" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "message=Must match: \`type(scope): description\` — e.g. \`feat(auth): add login\`" >> $GITHUB_OUTPUT
          fi

      - name: Scan diff for secrets
        id: secret_scan
        run: |
          git fetch origin ${{ github.base_ref }} --quiet 2>/dev/null || true
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/diff.txt 2>/dev/null || \
          git diff HEAD~1 > /tmp/diff.txt 2>/dev/null || \
          echo "" > /tmp/diff.txt

          FOUND=false
          if grep -qE "AKIA[0-9A-Z]{16}" /tmp/diff.txt 2>/dev/null; then FOUND=true; fi
          if grep -qE "ghp_[A-Za-z0-9]{36}" /tmp/diff.txt 2>/dev/null; then FOUND=true; fi
          if grep -qE "sk-[A-Za-z0-9]{32,}" /tmp/diff.txt 2>/dev/null; then FOUND=true; fi
          if grep -qiE "(api_key|secret_key|password)\s*[=:\"']\s*[A-Za-z0-9+/]{20,}" /tmp/diff.txt 2>/dev/null; then FOUND=true; fi
          echo "secrets_found=$FOUND" >> $GITHUB_OUTPUT

      - name: Generate diff summary
        id: diff_summary
        run: |
          git fetch origin ${{ github.base_ref }} --quiet 2>/dev/null || true
          STATS=$(git diff --stat origin/${{ github.base_ref }}...HEAD 2>/dev/null | tail -1 || echo "Unable to compute diff stats")
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null | head -15 | tr '\n' ' ' || echo "")
          echo "stats=$STATS" >> $GITHUB_OUTPUT
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Post validation comment
        uses: actions/github-script@v7
        with:
          script: |
            const titleValid = "${{ steps.title_check.outputs.valid }}" === "true";
            const secretsFound = "${{ steps.secret_scan.outputs.secrets_found }}" === "true";
            const titleMsg = `${{ steps.title_check.outputs.message }}`;
            const stats = `${{ steps.diff_summary.outputs.stats }}`;
            const files = `${{ steps.diff_summary.outputs.files }}`;

            const lines = [
              "## 🔍 PR Validator Report",
              "",
              "| Check | Status | Detail |",
              "|-------|--------|--------|",
              `| PR Title Format | ${titleValid ? "✅ Pass" : "❌ Fail"} | ${titleMsg} |`,
              `| Secret Scan | ${secretsFound ? "🚨 **BLOCKED**" : "✅ Clean"} | ${secretsFound ? "Potential secrets found — review diff!" : "No secrets detected"} |`,
              "",
              `**Diff:** ${stats}`,
            ];
            if (files) lines.push(`**Files:** \`${files.trim()}\``);
            if (secretsFound) {
              lines.push("", "---", "> 🚨 **ACTION REQUIRED:** Do not merge until secrets are removed from the diff.");
            }
            lines.push("", `> _Auto-generated by PR Validator · commit \`${{ github.sha }}\`_`);
            const body = lines.join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existing = comments.find(c =>
              c.user.login === "github-actions[bot]" && c.body.includes("PR Validator Report")
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner, repo: context.repo.repo, body
              });
            }
