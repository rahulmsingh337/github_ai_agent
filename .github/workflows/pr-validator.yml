name: 🔍 PR Validator Agent

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR Title (Conventional Commits)
        id: title_check
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if echo "$TITLE" | grep -qE "^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\(.+\))?: .{1,72}$"; then
            echo "valid=true" >> $GITHUB_OUTPUT
            echo "message=Valid Conventional Commit format" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "message=Must match: type(scope): description — e.g. feat(auth): add login" >> $GITHUB_OUTPUT
          fi

      - name: Scan for secrets in diff
        id: secret_scan
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt || true
          if grep -qiE "(api[_-]?key|secret[_-]?key|password|token|private[_-]?key)\s*[=:\"'\`]\s*[A-Za-z0-9+/]{20,}" diff.txt; then
            echo "secrets_found=true" >> $GITHUB_OUTPUT
          else
            echo "secrets_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate diff summary
        id: diff_summary
        run: |
          STATS=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -1)
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | head -20 | tr '\n' ', ' | sed 's/,$//')
          echo "stats=$STATS" >> $GITHUB_OUTPUT
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Post validation comment
        uses: actions/github-script@v7
        with:
          script: |
            const titleValid = "${{ steps.title_check.outputs.valid }}" === "true";
            const secretsFound = "${{ steps.secret_scan.outputs.secrets_found }}" === "true";
            const titleMsg = `${{ steps.title_check.outputs.message }}`;
            const stats = `${{ steps.diff_summary.outputs.stats }}`;
            const files = `${{ steps.diff_summary.outputs.files }}`;

            const body = `## 🔍 PR Validator Report

            | Check | Status | Detail |
            |-------|--------|--------|
            | PR Title Format | ${titleValid ? "✅ Pass" : "❌ Fail"} | ${titleMsg} |
            | Secret Scan | ${secretsFound ? "🚨 BLOCKED" : "✅ Clean"} | ${secretsFound ? "⚠️ Potential secrets found in diff — review immediately!" : "No secrets detected"} |

            **Diff Stats:** ${stats}
            **Changed Files:** \`${files}\`

            ${secretsFound ? "---\n> 🚨 **ACTION REQUIRED:** Potential secrets detected. Do not merge until reviewed." : ""}
            > _Auto-generated by PR Validator Agent_`;

            // Update existing comment if present
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existing = comments.find(c =>
              c.user.login === "github-actions[bot]" &&
              c.body.includes("PR Validator Report")
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }
