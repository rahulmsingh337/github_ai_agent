name: 📡 Vercel Monitor Agent

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deployment
        run: sleep 60

      - name: Deep health check
        id: health
        run: |
          URL="${{ secrets.VERCEL_PROJECT_URL }}"
          if [ -z "$URL" ]; then
            echo "healthy=skip" >> $GITHUB_OUTPUT
            exit 0
          fi

          RESULT=$(curl -s -o /tmp/response.html \
            -w "%{http_code}|%{time_total}|%{ssl_verify_result}" \
            --max-time 30 --location "$URL" || echo "000|0|1")

          HTTP_CODE=$(echo $RESULT | cut -d"|" -f1)
          RESPONSE_TIME=$(echo $RESULT | cut -d"|" -f2)
          SSL_OK=$(echo $RESULT | cut -d"|" -f3)
          BODY_SIZE=$(wc -c < /tmp/response.html 2>/dev/null || echo "0")

          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "response_time=$RESPONSE_TIME" >> $GITHUB_OUTPUT
          echo "ssl_ok=$SSL_OK" >> $GITHUB_OUTPUT
          echo "body_size=$BODY_SIZE" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" = "200" ] && [ "$SSL_OK" = "0" ] && [ "$BODY_SIZE" -gt 100 ]; then
            echo "healthy=true" >> $GITHUB_OUTPUT
          else
            echo "healthy=false" >> $GITHUB_OUTPUT
          fi

      - name: Create issue if unhealthy
        if: steps.health.outputs.healthy == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toISOString();
            const title = `📡 Vercel Down: Health check failed [${now.split("T")[0]}]`;
            const sslStatus = "${{ steps.health.outputs.ssl_ok }}" === "0" ? "✅ Valid" : "❌ Error";
            const body = `## 📡 Vercel Monitor Alert

            The deployment health check **FAILED** after the latest push to \`main\`.

            | Metric | Value |
            |--------|-------|
            | HTTP Status | \`${{ steps.health.outputs.http_code }}\` |
            | Response Time | \`${{ steps.health.outputs.response_time }}s\` |
            | SSL Certificate | ${sslStatus} |
            | Response Body Size | \`${{ steps.health.outputs.body_size }} bytes\` |
            | Triggered By | \`${{ github.sha }}\` |
            | Timestamp | \`${now}\` |

            ### Immediate Actions
            1. Check [Vercel Dashboard](https://vercel.com/dashboard) for deployment status
            2. Review the triggering commit: \`${{ github.sha }}\`
            3. Check Vercel build logs for errors

            > Auto-generated by Vercel Monitor Agent`;

            // Avoid duplicate issues — check if one already exists for this sha
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "incident"
            });
            const existing = issues.find(i => i.body && i.body.includes(context.sha));
            if (!existing) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["incident", "deployment", "automated"]
              });
            }
