name: 📡 Vercel Monitor Agent

on:
  push:
    branches: [main, master, production, prod, release]
  schedule:
    - cron: "*/15 * * * *"  # Also poll every 15 minutes
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target URL
        id: url
        run: |
          URL="${{ secrets.VERCEL_PROJECT_URL }}"
          URL="${URL:-${{ secrets.DEPLOY_URL }}}"
          URL="${URL:-${{ secrets.APP_URL }}}"
          URL="${URL:-${{ secrets.PRODUCTION_URL }}}"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "has_url=$( [ -n "$URL" ] && echo true || echo false )" >> $GITHUB_OUTPUT

      - name: Wait for deployment
        if: steps.url.outputs.has_url == 'true' && github.event_name == 'push'
        run: sleep 60

      - name: Deep health check
        id: health
        if: steps.url.outputs.has_url == 'true'
        run: |
          URL="${{ steps.url.outputs.url }}"
          echo "🔍 Checking: $URL"

          # Full check: status, time, SSL, redirect, body
          RESULT=$(curl -s -o /tmp/response.html \
            -w "%{http_code}|%{time_total}|%{ssl_verify_result}|%{num_redirects}|%{size_download}" \
            --max-time 30 --location "$URL" 2>/dev/null || echo "000|0|1|0|0")

          HTTP=$(echo "$RESULT"     | cut -d"|" -f1)
          TIME=$(echo "$RESULT"     | cut -d"|" -f2)
          SSL=$(echo "$RESULT"      | cut -d"|" -f3)
          REDIRECTS=$(echo "$RESULT"| cut -d"|" -f4)
          BODY_SIZE=$(echo "$RESULT"| cut -d"|" -f5)

          echo "http=$HTTP"           >> $GITHUB_OUTPUT
          echo "time=$TIME"           >> $GITHUB_OUTPUT
          echo "ssl=$SSL"             >> $GITHUB_OUTPUT
          echo "redirects=$REDIRECTS" >> $GITHUB_OUTPUT
          echo "body_size=$BODY_SIZE" >> $GITHUB_OUTPUT

          # Check for error strings in response body
          ERROR_IN_BODY=false
          if grep -qiE "(application error|internal server error|502 bad gateway|503 service unavailable|404 not found)" \
             /tmp/response.html 2>/dev/null; then
            ERROR_IN_BODY=true
          fi
          echo "error_in_body=$ERROR_IN_BODY" >> $GITHUB_OUTPUT

          # Determine health
          HEALTHY=true
          [ "$HTTP" != "200" ]        && HEALTHY=false
          [ "$SSL"  != "0" ]          && HEALTHY=false
          [ "$BODY_SIZE" -lt 100 ]    && HEALTHY=false
          [ "$ERROR_IN_BODY" = "true" ] && HEALTHY=false

          echo "healthy=$HEALTHY" >> $GITHUB_OUTPUT

          if [ "$HEALTHY" = "true" ]; then
            echo "✅ Health check passed (HTTP $HTTP, ${TIME}s, ${BODY_SIZE}B, SSL:OK)"
          else
            echo "❌ Health check FAILED"
            echo "   HTTP: $HTTP | Time: ${TIME}s | SSL: $SSL | Body: ${BODY_SIZE}B | Error in body: $ERROR_IN_BODY"
          fi
        continue-on-error: true

      - name: Create incident issue if unhealthy
        if: steps.health.outputs.healthy == 'false' && steps.url.outputs.has_url == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const now     = new Date().toISOString();
            const date    = now.split("T")[0];
            const http    = "${{ steps.health.outputs.http }}";
            const time    = "${{ steps.health.outputs.time }}";
            const ssl     = "${{ steps.health.outputs.ssl }}" === "0" ? "✅ Valid" : "❌ Error";
            const size    = "${{ steps.health.outputs.body_size }}";
            const errBody = "${{ steps.health.outputs.error_in_body }}" === "true";
            const url     = "${{ steps.url.outputs.url }}";
            const sha     = "${{ github.sha }}";

            // Deduplicate — check for open incident with same SHA
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "incident"
            });
            if (issues.find(i => i.body && i.body.includes(sha))) {
              console.log("Incident already open for this commit — skipping");
              return;
            }

            const title = `📡 Deployment Down: Health check failed — ${date}`;
            const body = [
              "## 📡 Vercel Monitor — Incident Report",
              "",
              `**URL:** ${url}`,
              `**Detected:** ${now}`,
              "",
              "| Metric | Value | Status |",
              "|--------|-------|--------|",
              `| HTTP Status | \`${http}\` | ${http === "200" ? "✅" : "❌"} |`,
              `| Response Time | \`${parseFloat(time).toFixed(2)}s\` | ${parseFloat(time) < 5 ? "✅" : "⚠️"} |`,
              `| SSL Certificate | — | ${ssl} |`,
              `| Response Body | \`${size} bytes\` | ${parseInt(size) > 100 ? "✅" : "❌"} |`,
              `| Error in Body | — | ${errBody ? "❌ Yes" : "✅ No"} |`,
              "",
              "### Triggered by",
              `- Commit: \`${sha}\``,
              `- Branch: \`${{ github.ref_name }}\``,
              "",
              "### Suggested Actions",
              "1. Check [Vercel Dashboard](https://vercel.com/dashboard) for build/deployment errors",
              `2. Review the triggering commit: \`${sha}\``,
              "3. Check application logs for runtime errors",
              "4. Verify environment variables are set correctly",
              "5. Roll back if needed: `vercel rollback`",
              "",
              "> Auto-generated by Vercel Monitor Agent — close this issue once resolved"
            ].join("\n");

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, body, labels: ["incident", "deployment", "automated"]
            });
            console.log(`Created incident issue #${issue.number}`);

      - name: No URL configured — skip
        if: steps.url.outputs.has_url == 'false'
        run: |
          echo "ℹ️ No deployment URL configured."
          echo "Add one of these secrets to enable monitoring:"
          echo "  VERCEL_PROJECT_URL, DEPLOY_URL, APP_URL, or PRODUCTION_URL"
